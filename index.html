<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#FFFAFA">
<title>No memes</title>
<link rel="shortcut icon" href="favicon.ico?v=2">
<link rel="icon" type="image/png" href="icons/favicon.png?v=2">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=2">
<link rel="manifest" href="manifest.webmanifest">
<script>{const t=localStorage.theme||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;document.querySelector('meta[name="theme-color"]').content=t==='dark'?'#302F2E':'#FFFAFA'}</script>
<link rel="stylesheet" href="fonts/lxgwwenkaiscreen.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="brandTop">
      <img class="brandIcon" src="icons/app-icon-192.png" alt="" aria-hidden="true">
      <h1>No memes</h1>
    </div>
  </div>
  <button id="langToggle" class="ghost" title="切换语言">中/英</button>
  <button id="themeToggle" class="ghost themeToggle" title="切换外观"><span class="tw light">Light</span><span class="sep">/</span><span class="tw dark">Dark</span></button>
  <button id="settingsBtn" class="ghost" title="连接 FF Logs">登录 FF Logs</button>
</header>

<main>
  <div class="searchWrap">
    <input id="q" placeholder="角色名，或 角色名@服务器" autocomplete="off" spellcheck="false">
    <button id="go">查询</button>
    <div id="sugg" class="sugg hidden"></div>
  </div>
  <div class="searchHint">基于 FF Logs 的公开数据，上传了才能查到。查不到不等于没打</div>

  <div id="chips" class="chips"></div>

  <section id="result"></section>
</main>

<footer>
  <span id="points"></span>
</footer>

<dialog id="settings">
  <form method="dialog">
    <h2>连接 FF Logs</h2>
    <div id="authBox"></div>
    <details id="advBox">
      <summary>使用自己的 API Client（高级）</summary>
      <p class="note">在
        <a href="https://cn.fflogs.com/api/clients/" target="_blank" rel="noopener">cn.fflogs.com/api/clients</a>
        创建一个 Client（名字随意，Redirect URL 填 <code>https://localhost</code> 即可），
        把 Client ID 和 Client Secret 粘贴到这里然后点击保存。凭据只存在你自己的浏览器里。</p>
      <label>Client ID<input id="cfgId" autocomplete="off" spellcheck="false"></label>
      <label>Client Secret<input id="cfgSecret" type="password" autocomplete="off"></label>
      <label>FF Logs 站点<input id="cfgBase" value="https://cn.fflogs.com" spellcheck="false"></label>
    </details>
    <div class="row">
      <!-- 保存放 DOM 第一个：form method=dialog 里按回车触发的是第一个提交按钮；视觉顺序由 CSS row-reverse 保持 -->
      <button value="save" id="cfgSave">保存</button>
      <button value="cancel" class="ghost">关闭</button>
    </div>
  </form>
</dialog>

<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>

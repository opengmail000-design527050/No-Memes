<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f8efdc">
<title>No进度欺诈</title>
<link rel="shortcut icon" href="favicon.ico?v=2">
<link rel="icon" type="image/png" href="icons/favicon.png?v=2">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=2">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="brandTop">
      <img class="brandIcon" src="icons/app-icon-192.png" alt="" aria-hidden="true">
      <h1>No进度欺诈</h1>
    </div>
    <div class="sub">RAID PROGRESS · FFLOGS 国服</div>
  </div>
  <button id="settingsBtn" class="ghost" title="API 设置">API 设置</button>
</header>

<main>
  <div class="searchWrap">
    <input id="q" placeholder="角色名，或 角色名@服务器" autocomplete="off" spellcheck="false">
    <button id="go">查询</button>
    <div id="sugg" class="sugg hidden"></div>
  </div>
  <div class="searchHint">基于FF logs的公开数据，上传了才能查到。查不到不等于没打</div>

  <div id="chips" class="chips"></div>

  <section id="result"></section>
</main>

<footer>
  <span id="points"></span>
</footer>

<dialog id="settings">
  <form method="dialog">
    <h2>FFLogs API 设置</h2>
    <p class="note">本页面不自带 API。请在
      <a href="https://cn.fflogs.com/api/clients/" target="_blank" rel="noopener">cn.fflogs.com/api/clients</a>
      创建一个 Client（名字随意，Redirect URL 填 <code>https://localhost</code> 即可），
      把 Client ID 和 Client Secret 粘贴到这里然后点击保存。API只存在你自己的浏览器里。</p>
    <label>Client ID<input id="cfgId" autocomplete="off" spellcheck="false"></label>
    <label>Client Secret<input id="cfgSecret" type="password" autocomplete="off"></label>
    <label>FFLogs 站点<input id="cfgBase" value="https://cn.fflogs.com" spellcheck="false"></label>
    <div class="row">
      <button value="cancel" class="ghost">取消</button>
      <button value="save" id="cfgSave">保存</button>
    </div>
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
